name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Effect diagnostics
        run: bun run effect:diagnostics

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Pack core dry run
        working-directory: packages/core
        run: bun pm pack --dry-run

      - name: Pack react dry run
        working-directory: packages/react
        run: bun pm pack --dry-run
